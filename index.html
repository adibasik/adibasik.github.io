<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Market Price Calculator | Really World</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d5 100%);
            font-family: 'Segoe UI', -apple-system, 'Minecraft', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Главная карточка — светлая */
        .container {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.05);
            padding: 28px 26px 36px;
            transition: all 0.2s;
            border: 1px solid #ddd0bc;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin: 0 0 6px 0;
            color: #2c5a2e;
            text-shadow: none;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .sub {
            text-align: center;
            color: #6b5a44;
            font-size: 0.85rem;
            margin-bottom: 28px;
            border-bottom: 2px solid #e2d5c0;
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
            font-weight: 500;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 700;
            margin-bottom: 8px;
            color: #3e2e1f;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label i {
            font-style: normal;
            background: #e9e0d3;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #5a3e28;
            font-weight: normal;
        }

        input {
            background: #fefcf8;
            border: 2px solid #d4c4ac;
            padding: 14px 18px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #2b2a27;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #7cb342;
            box-shadow: 0 0 0 3px rgba(124, 179, 66, 0.2);
            background: #ffffff;
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 8px;
            color: #8b765a;
            padding: 0 8px;
        }

        /* Кнопка */
        .calc-btn {
            background: #2e7d32;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: inherit;
            color: white;
            border-radius: 60px;
            margin: 20px 0 20px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #1b5e20;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .calc-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1b5e20;
        }

        /* Результаты — светлая область */
        .results {
            background: #faf7f0;
            border-radius: 28px;
            padding: 20px;
            margin-top: 20px;
            border-left: 6px solid #2e7d32;
            box-shadow: inset 0 1px 3px #0001, 0 2px 5px #0001;
        }

        .best-card {
            background: #eef5e9;
            padding: 18px 20px;
            border-radius: 28px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #c8e6b5;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .best-price {
            font-size: 2.4rem;
            font-weight: 800;
            color: #1b5e20;
            font-family: 'Courier New', monospace;
            background: #ffffffcc;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 60px;
            margin: 8px 0;
            letter-spacing: 1px;
        }

        .command {
            background: #2d2a24;
            padding: 12px 16px;
            border-radius: 60px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            display: inline-block;
            width: 100%;
            text-align: center;
            color: #d4ffb0;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid #6f8f5c;
        }

        .option-list {
            max-height: 280px;
            overflow-y: auto;
            margin-top: 15px;
            padding-right: 4px;
        }

        .option-item {
            background: #ffffff;
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #ded3c0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            color: #3d3529;
        }

        .badge {
            background: #e7e0d4;
            padding: 4px 14px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: #3c5e2b;
        }

        hr {
            border-color: #dacfa8;
            margin: 16px 0 8px;
        }

        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 22px;
            color: #8e7a5e;
            background: #fef7ea;
            padding: 8px;
            border-radius: 30px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #e7dfd2;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #8baa6e;
            border-radius: 10px;
        }

        .perfect-badge {
            background: #c8e6c9;
            color: #1f5a23;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌾 RW MARKET • КАЛЬКУЛЯТОР</h1>
    <div class="sub">безопасный перенос валюты через стаки</div>

    <div class="input-group">
        <label>💰 Сумма перевода <i>сколько нужно получить</i></label>
        <input type="number" id="targetAmount" value="5000000" step="1" placeholder="например 5000000">
    </div>

    <div class="input-group">
        <label>📦 Лимит цены за 1 предмет <i>макс /market sell</i></label>
        <input type="number" id="maxPrice" value="17000" step="1" placeholder="макс цена за 1 шт">
    </div>

    <div class="input-group">
        <label>🧩 Макс. стаков <i>поиск до этого числа</i></label>
        <input type="number" id="maxStacks" value="20" step="1" min="1" max="50">
        <div class="slider-info">
            <span>⚡ Меньше стаков = быстрее</span>
            <span>📦 1 стак = 64 предмета</span>
        </div>
    </div>

    <button class="calc-btn" id="calcBtn">🧮 РАССЧИТАТЬ</button>

    <div class="results" id="resultsArea">
        <div style="text-align:center; color:#6f5a3e; padding:10px;">⚙️ Введи данные и нажми «Рассчитать»<br>✅ Подберём лучшую цену без потерь</div>
    </div>
    <div class="footer">
        🧠 Логика: цена за 1шт × (стаки×64) ≥ нужная сумма, цена ≤ лимит, округление вверх → целое число.
    </div>
</div>

<script>
    (function() {
        const STACK_SIZE = 64;

        function findOptions(target, maxPricePerItem, maxStacksLimit) {
            const options = [];

            for (let stacks = 1; stacks <= maxStacksLimit; stacks++) {
                const totalItems = stacks * STACK_SIZE;
                const basePrice = Math.floor(target / totalItems);
                const candidates = [basePrice, basePrice + 1];
                
                for (let price of candidates) {
                    if (price <= 0) continue;
                    if (price > maxPricePerItem) continue;
                    const totalReceived = price * totalItems;
                    const difference = totalReceived - target;
                    if (difference >= 0) {
                        options.push({
                            stacks: stacks,
                            pricePerItem: price,
                            totalReceived: totalReceived,
                            difference: difference
                        });
                    }
                }
            }
            
            options.sort((a, b) => {
                if (a.stacks !== b.stacks) return a.stacks - b.stacks;
                return a.difference - b.difference;
            });
            
            return options;
        }
        
        function formatNumber(num) {
            return num.toLocaleString('ru-RU');
        }
        
        function renderResults(target, maxPricePerItem, maxStacksLimit) {
            const resultsDiv = document.getElementById('resultsArea');
            
            if (isNaN(target) || target <= 0) {
                resultsDiv.innerHTML = `<div style="background:#ffe0b5; color:#a5441a; padding:18px; border-radius:28px; font-weight:bold;">❌ Ошибка: сумма перевода должна быть больше 0.</div>`;
                return;
            }
            if (isNaN(maxPricePerItem) || maxPricePerItem <= 0) {
                resultsDiv.innerHTML = `<div style="background:#ffe0b5; color:#a5441a; padding:18px; border-radius:28px;">❌ Лимит цены должен быть положительным числом.</div>`;
                return;
            }
            if (isNaN(maxStacksLimit) || maxStacksLimit < 1) {
                resultsDiv.innerHTML = `<div style="background:#ffe0b5; color:#a5441a; padding:18px; border-radius:28px;">❌ Максимум стаков должен быть хотя бы 1.</div>`;
                return;
            }
            
            const options = findOptions(target, maxPricePerItem, maxStacksLimit);
            
            if (options.length === 0) {
                resultsDiv.innerHTML = `
                    <div style="text-align:center; padding:10px;">
                        <span style="font-size:2rem;">⚠️</span>
                        <p style="margin:12px 0; font-weight:bold; color:#855e32;">Нет подходящих вариантов</p>
                        <p>Попробуйте увеличить «Макс. стаков» или поднять лимит цены.</p>
                        <small>💡 Чем больше стаков — тем ниже цена за 1 предмет.</small>
                    </div>
                `;
                return;
            }
            
            const best = options[0];
            
            let optionsHtml = `<div style="margin-top: 16px; font-weight: 700; color:#4a3924;">📋 Все варианты (${options.length}):</div><div class="option-list">`;
            for (let opt of options) {
                const diffText = opt.difference === 0 ? '🎯 ТОЧНО!' : `➕ лишних ${formatNumber(opt.difference)}`;
                optionsHtml += `
                    <div class="option-item">
                        <span>📦 ${opt.stacks} стак(ов) / ${opt.stacks * STACK_SIZE} шт</span>
                        <span class="badge">💰 ${formatNumber(opt.pricePerItem)} /шт</span>
                        <span>🧾 итог ${formatNumber(opt.totalReceived)}</span>
                        <span style="color:#558b2f; font-weight:bold;">${diffText}</span>
                    </div>
                `;
            }
            optionsHtml += `</div>`;
            
            const perfectBlock = best.difference === 0 
                ? '<span class="perfect-badge">✅ ИДЕАЛЬНО! Без переплаты</span>' 
                : `<span style="background:#ffecb3; padding:4px 12px; border-radius:50px;">⚠️ Переплата: ${formatNumber(best.difference)} монет (минимум)</span>`;
            
            const fullHtml = `
                <div class="best-card">
                    <div style="font-size:0.75rem; letter-spacing:1px; color:#6b4c2c;">🏆 ЛУЧШИЙ ВАРИАНТ</div>
                    <div style="font-size:1.2rem; margin: 4px 0 2px; font-weight:700;">⚡ ${best.stacks} стак(ов) (${best.stacks * STACK_SIZE} предметов)</div>
                    <div class="best-price">${formatNumber(best.pricePerItem)} монет / 1 предмет</div>
                    <div class="command" style="margin-top: 14px;">/market sell ${best.pricePerItem}</div>
                    <div style="margin: 14px 0 0; background:#fff1df; border-radius: 40px; padding: 10px; font-weight:500;">
                        🧾 Итого получите: <strong>${formatNumber(best.totalReceived)}</strong> (нужно было ${formatNumber(target)})<br>
                        ${perfectBlock}
                    </div>
                    <div style="margin-top: 14px; font-size:0.8rem; color:#5c503f;">🔄 Выставить ${best.stacks} раз(а) с полным стаком (64 шт) в руке</div>
                </div>
                ${optionsHtml}
                <hr>
                <div style="font-size:0.7rem; margin-top: 8px; color:#776b58;">
                📐 Формула: цена за 1шт × (стаки × 64) = сумма на руки ≥ нужной суммы.<br>
                🧮 Округление вверх — чтобы сервер не снял меньше.
                </div>
            `;
            
            resultsDiv.innerHTML = fullHtml;
        }
        
        const calcBtn = document.getElementById('calcBtn');
        const targetInput = document.getElementById('targetAmount');
        const maxPriceInput = document.getElementById('maxPrice');
        const maxStacksInput = document.getElementById('maxStacks');
        
        function performCalculation() {
            let target = parseInt(targetInput.value, 10);
            let maxPrice = parseInt(maxPriceInput.value, 10);
            let maxStacks = parseInt(maxStacksInput.value, 10);
            
            if (isNaN(target)) target = 0;
            if (isNaN(maxPrice)) maxPrice = 0;
            if (isNaN(maxStacks)) maxStacks = 5;
            
            renderResults(target, maxPrice, maxStacks);
        }
        
        calcBtn.addEventListener('click', performCalculation);
        [targetInput, maxPriceInput, maxStacksInput].forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performCalculation();
            });
        });
        
        // Автозапуск
        performCalculation();
    })();
</script>
</body>
</html>
