<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Market Price Calculator | Really World</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* Удобно на мобилках, но текст можно копировать */
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', 'Minecraft', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Главная карточка */
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(30, 20, 15, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            padding: 24px 22px 36px;
            border: 1px solid #ffd966;
            transition: all 0.2s;
        }

        h1 {
            text-align: center;
            font-size: 1.9rem;
            margin: 0 0 8px 0;
            color: #ffd966;
            text-shadow: 3px 3px 0 #5a3e1a;
            letter-spacing: 2px;
            word-break: keep-all;
        }

        .sub {
            text-align: center;
            color: #d4c4a8;
            font-size: 0.8rem;
            margin-bottom: 28px;
            border-bottom: 1px dashed #ffd96680;
            display: inline-block;
            width: 100%;
            padding-bottom: 8px;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #f3e1b3;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            font-style: normal;
            background: #2c1a0e;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #ffbc6e;
        }

        input {
            background: #2d2418;
            border: 2px solid #b97f44;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-family: monospace;
            font-weight: bold;
            color: #ffefcf;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255, 180, 71, 0.4);
            background: #3b2c1c;
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-top: 8px;
            color: #cfb27c;
            padding: 0 10px;
        }

        /* Кнопка */
        .calc-btn {
            background: #f3a712;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: inherit;
            color: #2c1a0e;
            border-radius: 60px;
            margin: 20px 0 20px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 6px 0 #7a4800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .calc-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #7a4800;
        }

        /* Результаты */
        .results {
            background: #1f1912cc;
            border-radius: 36px;
            padding: 20px;
            margin-top: 20px;
            border-left: 6px solid #f3a712;
        }

        .best-card {
            background: #2a4b2c;
            padding: 14px 18px;
            border-radius: 28px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #ffd966;
        }

        .best-price {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffd966;
            font-family: monospace;
            word-break: break-all;
        }

        .command {
            background: #0e0b07;
            padding: 12px;
            border-radius: 48px;
            font-family: monospace;
            font-size: 1.2rem;
            display: inline-block;
            width: 100%;
            text-align: center;
            color: #b9f5a0;
            letter-spacing: 1px;
        }

        .option-list {
            max-height: 260px;
            overflow-y: auto;
            margin-top: 15px;
            padding-right: 4px;
        }

        .option-item {
            background: #2b241cb3;
            margin: 8px 0;
            padding: 10px 12px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 6px;
            border: 1px solid #ab8e54;
        }

        .badge {
            background: #ffd96630;
            padding: 4px 12px;
            border-radius: 60px;
            font-family: monospace;
        }

        hr {
            border-color: #ffd96640;
            margin: 12px 0;
        }

        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #c0a26b;
        }

        button {
            background: none;
            border: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #221d15;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #f3a712;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚔️ RW MARKET ⚔️</h1>
    <div class="sub">калькулятор • стаки • безопасная цена</div>

    <div class="input-group">
        <label>💰 Сумма перевода <i>нужно получить</i></label>
        <input type="number" id="targetAmount" value="5000000" step="1" placeholder="например 5000000">
    </div>

    <div class="input-group">
        <label>📦 Лимит цены за 1 предмет <i>макс. значение /market sell</i></label>
        <input type="number" id="maxPrice" value="17000" step="1" placeholder="макс цена за 1 шт">
    </div>

    <div class="input-group">
        <label>🧩 Макс. стаков для поиска <i>рекомендуем 1-25</i></label>
        <input type="number" id="maxStacks" value="20" step="1" min="1" max="50">
        <div class="slider-info">
            <span>⚡ Меньше стаков = быстрее сделка</span>
            <span>📦 1 стак = 64 предмета</span>
        </div>
    </div>

    <button class="calc-btn" id="calcBtn">🔨 РАССЧИТАТЬ</button>

    <div class="results" id="resultsArea">
        <div style="text-align:center; color:#ffe2b5;">⚙️ Введи параметры и нажми "РАССЧИТАТЬ"<br>✅ Подберём цену без потерь!</div>
    </div>
    <div class="footer">
        🧠 Логика: цена за 1 шт × (стаки×64) ≥ нужная сумма,<br>
        цена ≤ лимит, округление вверх → целое число.
    </div>
</div>

<script>
    (function() {
        // ----- ЛОГИКА расчёта (полностью по ТЗ) -----
        // 1 стак = 64 предмета
        const STACK_SIZE = 64;

        function findOptions(target, maxPricePerItem, maxStacksLimit) {
            const options = [];

            for (let stacks = 1; stacks <= maxStacksLimit; stacks++) {
                const totalItems = stacks * STACK_SIZE;   // всего предметов за все стаки
                // базовая цена за 1 шт (целочисленное деление)
                const basePrice = Math.floor(target / totalItems);
                
                // проверяем два варианта: basePrice и basePrice+1 (округление вверх, чтобы не потерять)
                const candidates = [basePrice, basePrice + 1];
                
                for (let price of candidates) {
                    if (price <= 0) continue;
                    if (price > maxPricePerItem) continue;
                    
                    const totalReceived = price * totalItems;
                    const difference = totalReceived - target;   // переплата / остаток
                    // условие: получили НЕ МЕНЬШЕ, чем нужно (нельзя недополучить)
                    if (difference >= 0) {
                        options.push({
                            stacks: stacks,
                            pricePerItem: price,
                            totalReceived: totalReceived,
                            difference: difference
                        });
                    }
                }
            }
            
            // сортировка: 1) меньше стаков, 2) минимальная разница (чем точнее, тем лучше)
            options.sort((a, b) => {
                if (a.stacks !== b.stacks) return a.stacks - b.stacks;
                return a.difference - b.difference;
            });
            
            return options;
        }
        
        function formatNumber(num) {
            return num.toLocaleString('ru-RU');
        }
        
        function renderResults(target, maxPricePerItem, maxStacksLimit) {
            const resultsDiv = document.getElementById('resultsArea');
            
            // Валидация
            if (isNaN(target) || target <= 0) {
                resultsDiv.innerHTML = `<div style="background:#8b3c2c; padding:16px; border-radius:28px;">❌ Ошибка: сумма перевода должна быть положительным числом.</div>`;
                return;
            }
            if (isNaN(maxPricePerItem) || maxPricePerItem <= 0) {
                resultsDiv.innerHTML = `<div style="background:#8b3c2c; padding:16px; border-radius:28px;">❌ Лимит цены должен быть больше 0.</div>`;
                return;
            }
            if (isNaN(maxStacksLimit) || maxStacksLimit < 1) {
                resultsDiv.innerHTML = `<div style="background:#8b3c2c; padding:16px; border-radius:28px;">❌ Максимум стаков должен быть хотя бы 1.</div>`;
                return;
            }
            
            const options = findOptions(target, maxPricePerItem, maxStacksLimit);
            
            if (options.length === 0) {
                resultsDiv.innerHTML = `
                    <div style="text-align:center;">
                        <span style="font-size:2rem;">⚠️</span>
                        <p style="margin:12px 0 0 0;"><strong>Нет вариантов</strong><br>
                        Попробуйте увеличить "Макс. стаков для поиска"<br>
                        или поднять лимит цены за предмет.</p>
                        <small style="display:block; margin-top:12px;">💡 Совет: 1 стак = 64 шт, чем больше стаков — тем ниже цена за 1 предмет.</small>
                    </div>
                `;
                return;
            }
            
            const best = options[0];
            // Генерируем HTML
            let optionsHtml = `<div style="margin-top:8px; font-weight:bold;">📋 Все подходящие варианты (${options.length}):</div><div class="option-list">`;
            for (let opt of options) {
                const diffText = opt.difference === 0 ? '🎯 ТОЧНО' : `➕ лишних ${formatNumber(opt.difference)}`;
                optionsHtml += `
                    <div class="option-item">
                        <span>📦 ${opt.stacks} стак(ов) / ${opt.stacks * STACK_SIZE} шт</span>
                        <span class="badge">💰 ${formatNumber(opt.pricePerItem)} /шт</span>
                        <span>🧾 итог ${formatNumber(opt.totalReceived)}</span>
                        <span style="color:#ffbc6e;">${diffText}</span>
                    </div>
                `;
            }
            optionsHtml += `</div>`;
            
            const perfectBadge = best.difference === 0 ? "✅ ИДЕАЛЬНО! Без переплаты" : `⚠️ Переплата: ${formatNumber(best.difference)} монет (минимальная возможная)`;
            
            const fullHtml = `
                <div class="best-card">
                    <div style="font-size:0.85rem; letter-spacing:1px;">🏆 РЕКОМЕНДУЕМЫЙ СПОСОБ</div>
                    <div style="font-size:1rem; margin: 5px 0;">⚡ ${best.stacks} стак(ов) ⚡</div>
                    <div class="best-price">${formatNumber(best.pricePerItem)} монет / 1 предмет</div>
                    <div class="command" style="margin-top: 12px;">/market sell ${best.pricePerItem}</div>
                    <div style="margin-top: 12px; background:#16100a; border-radius:40px; padding:6px;">
                        🧾 Итого получите: <strong>${formatNumber(best.totalReceived)}</strong> из ${formatNumber(target)} нужных<br>
                        ${perfectBadge}
                    </div>
                    <div style="margin-top: 12px; font-size:0.75rem;">🔄 Выставить ${best.stacks} раз(а) с полным стаком (64 предмета) в руке</div>
                </div>
                ${optionsHtml}
                <hr>
                <div style="font-size:0.75rem; margin-top: 6px;">
                📐 Формула: цена за 1шт × (стаки × 64) = результат ≥ нужная сумма<br>
                🧮 Округление всегда вверх, чтобы сервер не списал меньше.
                </div>
            `;
            
            resultsDiv.innerHTML = fullHtml;
        }
        
        // Обработчики
        const calcButton = document.getElementById('calcBtn');
        const targetInput = document.getElementById('targetAmount');
        const maxPriceInput = document.getElementById('maxPrice');
        const maxStacksInput = document.getElementById('maxStacks');
        
        function performCalculation() {
            const target = parseFloat(targetInput.value);
            const maxPrice = parseFloat(maxPriceInput.value);
            const maxStacks = parseInt(maxStacksInput.value, 10);
            
            // Для целых денег (валюты) – используем целые числа
            if (!Number.isInteger(target) || !Number.isInteger(maxPrice)) {
                // но можно и с плавающей, но в майнкрафте обычно целые
                if (!Number.isFinite(target) || !Number.isFinite(maxPrice)) {
                    alert('Пожалуйста, введите целые числа (монеты)');
                    return;
                }
            }
            renderResults(Math.floor(target), Math.floor(maxPrice), Math.floor(maxStacks));
        }
        
        calcButton.addEventListener('click', performCalculation);
        
        // При нажатии Enter тоже считаем
        const inputs = [targetInput, maxPriceInput, maxStacksInput];
        inputs.forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performCalculation();
            });
        });
        
        // Первый авто-расчёт при загрузке страницы (чтобы сразу увидеть 5.000.000 пример)
        setTimeout(() => {
            performCalculation();
        }, 50);
    })();
</script>
</body>
</html>
